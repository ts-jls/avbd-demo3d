<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVBD Three Viewer</title>
  </head>
  <body>
    <div id="app">
      <canvas id="renderer-canvas" data-testid="renderer-canvas"></canvas>
      <aside id="hud" aria-label="viewer diagnostics">
        <div class="title">AVBD Viewer</div>
        <div class="row"><span>Mode</span><strong id="viewer-mode" data-testid="viewer-mode">Sample</strong></div>
        <div class="row"><span>Status</span><strong id="connection-status" data-testid="connection-status">Sample scene</strong></div>
        <div class="row"><span>Scene</span><strong id="scene-name" data-testid="scene-name">Pyramid</strong></div>
        <div class="row"><span>Frame</span><strong id="frame-number" data-testid="frame-number">0</strong></div>
        <div class="row"><span>Bodies</span><strong id="body-count" data-testid="body-count">0</strong></div>
        <div class="row"><span>Batches</span><strong id="batch-count" data-testid="batch-count">0</strong></div>
        <div class="row"><span>Shapes</span><strong id="shape-counts" data-testid="shape-counts">none</strong></div>
        <div class="row"><span>FPS</span><strong id="render-fps" data-testid="render-fps">0.0</strong></div>
        <div class="row"><span>Dropped</span><strong id="dropped-frames" data-testid="dropped-frames">0</strong></div>
        <div class="row"><span>Snapshot</span><strong id="snapshot-size" data-testid="snapshot-size">0 KB</strong></div>
        <div class="row"><span>Parse</span><strong id="parse-ms" data-testid="parse-ms">0.00 ms</strong></div>
        <div class="row"><span>Apply</span><strong id="apply-ms" data-testid="apply-ms">0.00 ms</strong></div>
        <div class="row"><span>Render</span><strong id="render-ms" data-testid="render-ms">0.00 ms</strong></div>
        <div class="row"><span>WS</span><strong id="ws-kbps" data-testid="ws-kbps">0 KB/s</strong></div>
        <div class="row"><span>Interaction</span><strong id="interaction-status" data-testid="interaction-status">Orbit</strong></div>
        <div class="row"><span>Bridge</span><strong id="bridge-url" data-testid="bridge-url">ws://127.0.0.1:8765</strong></div>
      </aside>
      <aside id="debug-panel" aria-label="performance metrics" hidden>
        <div class="title">Performance</div>
        <button id="copy-metrics" data-testid="copy-metrics">Copy Metrics</button>
        <pre id="debug-metrics" data-testid="debug-metrics"></pre>
      </aside>
      <div id="controls">
        <label for="sample-scene">Sample</label>
        <select id="sample-scene" data-testid="sample-scene">
          <option value="pyramid">Pyramid</option>
          <option value="mixed">Mixed Primitives</option>
          <option value="dense">Dense Boxes</option>
        </select>
        <label for="native-scene">Native</label>
        <select id="native-scene" data-testid="native-scene">
          <option>Pyramid</option>
          <option>Sphere Pour on Cylinders</option>
          <option>Sphere Pour 5000 on Cylinders</option>
          <option>Sphere Pour 20000 on Cylinders</option>
          <option>Soft Body 8x8x8</option>
          <option>Sphere Stack</option>
          <option>Capsule Stack</option>
          <option>Cylinder Stack</option>
          <option>Bridge</option>
        </select>
        <label for="native-backend">Backend</label>
        <select id="native-backend" data-testid="native-backend">
          <option value="webgpu-avbd">WebGPU AVBD</option>
          <option value="cpu">CPU Reference</option>
          <option value="">Server Default</option>
        </select>
        <button id="native-load" data-testid="native-load">Load</button>
        <button id="native-pause" data-testid="native-pause">Pause</button>
        <button id="native-step" data-testid="native-step">Step</button>
        <button id="native-reset" data-testid="native-reset">Reset</button>
        <button id="debug-toggle" data-testid="debug-toggle">Metrics</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
